# CAP-082 / story 018-001: tinyproxy allowlist config.
#
# Runs as the egress gateway on the `claude-restricted` network.
# Claude Code containers reach this proxy via HTTP_PROXY /
# HTTPS_PROXY env vars. Anything NOT in the Allow list is denied.
#
# Allowlist covers:
#   - api.anthropic.com          — Claude API
#   - registry.npmjs.org         — npm package downloads
#   - *.pkg.github.com           — GitHub Packages
#   - api.github.com             — GitHub REST API
#   - codeload.github.com        — repo tarball downloads
#   - github.com                 — git clone over https
#   - raw.githubusercontent.com  — fetched config files
#
# To add a domain: append a FilterExtended entry below and restart
# the tinyproxy container. Intentionally NO wildcards — every
# exception is explicit.

User tinyproxy
Group tinyproxy

Port 8888
Listen 0.0.0.0
BindSame yes
Timeout 600
LogLevel Info

PidFile "/run/tinyproxy/tinyproxy.pid"

MaxClients 100
StartServers 5
MinSpareServers 5
MaxSpareServers 20

Filter "/etc/tinyproxy/filter"
FilterDefaultDeny Yes
FilterExtended On
FilterCaseSensitive No
FilterURLs Off

DisableViaHeader Yes

# Only allow connecting to the default HTTPS port — blocks
# things like `CONNECT example.com:25`.
ConnectPort 443
ConnectPort 563

Anonymous "Host"
Anonymous "Authorization"
Anonymous "User-Agent"
