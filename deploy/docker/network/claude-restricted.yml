# CAP-082 / story 018-001: `claude-restricted` Docker network + proxy sidecar.
#
# Run once per machine:
#   docker compose -f deploy/docker/network/claude-restricted.yml up -d
#
# This creates:
#   - An internal (no-egress) bridge network named `claude-restricted`
#   - A tinyproxy sidecar on that network that allow-lists a handful
#     of known-safe domains
#
# Claude Code containers attach to `claude-restricted` and point
# HTTP_PROXY / HTTPS_PROXY at `http://claude-proxy:8888`. Any
# connection to a domain not in `filter` is rejected.

services:
  claude-proxy:
    image: dannydirect/tinyproxy:latest
    container_name: claude-proxy
    restart: unless-stopped
    networks:
      - claude-restricted
      - claude-egress
    volumes:
      - ./tinyproxy.conf:/etc/tinyproxy/tinyproxy.conf:ro
      - ./filter:/etc/tinyproxy/filter:ro
    # Security — the proxy itself is a trusted egress gateway
    # but drop capabilities it doesn't need.
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    security_opt:
      - no-new-privileges
    read_only: true
    tmpfs:
      - /run/tinyproxy
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://127.0.0.1:8888/']
      interval: 30s
      timeout: 5s
      retries: 3

networks:
  claude-restricted:
    # `internal: true` means no automatic bridge to the host; the
    # only egress path is via the proxy above, which itself sits
    # on the non-internal claude-egress network.
    internal: true
    name: claude-restricted
  claude-egress:
    name: claude-egress
