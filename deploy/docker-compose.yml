services:
  hub:
    image: ghcr.io/lasswellt/claudehq:latest
    ports:
      - "${CHQ_HUB_PORT:-7700}:7700"
    environment:
      - CHQ_HUB_PORT=7700
      - CHQ_HUB_HOST=0.0.0.0
      - CHQ_HUB_DATABASEPATH=/app/data/db/chq.db
      - CHQ_HUB_RECORDINGSPATH=/app/data/recordings
      - CHQ_HUB_DASHBOARDSTATICPATH=/app/dashboard-static
      - CHQ_HUB_LOGLEVEL=${CHQ_HUB_LOGLEVEL:-info}
      - CHQ_AGENT_TOKEN=${CHQ_AGENT_TOKEN:-}
    volumes:
      - chq-db:/app/data/db
      - chq-recordings:/app/data/recordings
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:7700/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  chq-db:
  chq-recordings:
